name: Django CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        shell: powershell
        run: |
          $IMAGE_NAME = "ghcr.io/${{ github.repository }}:latest".ToLower()
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Run Locally
        shell: powershell
        run: |
          $IMAGE_NAME = "ghcr.io/${{ github.repository }}:latest".ToLower()
          
          # Проверяем, запущен ли контейнер, и останавливаем только если он есть
          $exists = docker ps -a -q --filter "name=my_django_app"
          if ($exists) {
              Write-Host "Stopping and removing existing container..."
              docker stop my_django_app
              docker rm my_django_app
          }

          Write-Host "Starting new container: $IMAGE_NAME"
          docker run -d -p 8000:8000 --name my_django_app $IMAGE_NAME







 






























