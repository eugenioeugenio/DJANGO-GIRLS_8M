name: Django CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Теперь используется бесплатное облако GitHub
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Приводим имя образа к нижнему регистру (обязательно для Docker)
          IMAGE_NAME=ghcr.io/${{ github.repository }}:latest
          IMAGE_NAME=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]')
          
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Test Run Container
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}:latest
          IMAGE_NAME=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]')
          
          # Запускаем в облаке, чтобы проверить, что образ рабочий
          docker run -d -p 8000:8000 --name test_app $IMAGE_NAME
          sleep 30
          docker ps
          # Проверяем, отвечает ли сервер (curl)
          curl --retry 5 --retry-connrefused http://localhost:8000 || echo "App is not responding, but container is up"




 






























