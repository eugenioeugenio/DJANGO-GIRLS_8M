    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          # Формируем имя образа (все в нижнем регистре)
          IMAGE_NAME=ghcr.io/${{ github.repository }}:latest
          IMAGE_NAME=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]')
          
          # Сборка и отправка в GitHub Packages
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

      - name: Run Container Locally
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository }}:latest
          IMAGE_NAME=$(echo $IMAGE_NAME | tr '[:upper:]' '[:lower:]')
          
          # Чистим старое (ошибки игнорируем)
          docker stop my_django_app || true
          docker rm my_django_app || true
          
          # Запуск
          docker run -d -p 8000:8000 --name my_django_app $IMAGE_NAME



 






























